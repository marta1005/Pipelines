Model_Selection:
  inputs:
    - FLAP
    - Altitude
    - TAS
    - Mass
    - q
    - gamma
    - Type_segment
    - "Xcg(%CMA)"
  outputs:
    - "1g"
    - "Vertical maneuver"
    - "Vertical gust"
    - Turn
    - "Frontal gust"
    - n0
    - Giro
  algorithms:
    - name: MLPRegressor
      label: MLP
      settings:
        # 19 features → 64 → 32 → 7 outputs  (3,591 params, α=0.01 L2 reg)
        hidden_layer_sizes: [64, 32]
        activation: relu
        solver: adam
        alpha: 0.01
        batch_size: 32
        learning_rate: adaptive
        learning_rate_init: 0.001
        # --- CHANGE max_iter FOR PRODUCTION RUN ---
        # Test: 5   |   Production: 500
        max_iter: 500
        early_stopping: true
        validation_fraction: 0.15
        n_iter_no_change: 20
        tol: 0.00001
        random_state: 42
        verbose: true

    - name: MultiOutputGradientBoosting
      label: GradientBoosting
      settings:
        # One GradientBoostingRegressor per output (7 independent models).
        # max_depth=4 and min_samples_leaf=5 prevent overfitting on ~600 samples.
        # --- CHANGE n_estimators FOR PRODUCTION RUN ---
        # Test: 10   |   Production: 100
        n_estimators: 100
        max_depth: 4
        learning_rate: 0.1
        subsample: 0.8
        min_samples_leaf: 5
        random_state: 42
        verbose: 0
